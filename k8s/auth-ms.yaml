# ── Auth MS ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-ms
  namespace: jeewan
  labels:
    app: auth-ms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-ms
  template:
    metadata:
      labels:
        app: auth-ms
    spec:
      containers:
        - name: auth-ms
          image: jeewan/auth-ms:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: jeewan-config
            - secretRef:
                name: jeewan-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-ms
  namespace: jeewan
spec:
  selector:
    app: auth-ms
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
