# ── Chatbot MS ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-ms
  namespace: jeewan
  labels:
    app: chatbot-ms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-ms
  template:
    metadata:
      labels:
        app: chatbot-ms
    spec:
      containers:
        - name: chatbot-ms
          image: jeewan/chatbot-ms:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: jeewan-config
            - secretRef:
                name: jeewan-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-ms
  namespace: jeewan
spec:
  selector:
    app: chatbot-ms
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
---
