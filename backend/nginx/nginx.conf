events {
    worker_connections 1024;
}

http {
    # Upstream services
    upstream auth      { server auth-ms:8001; }
    upstream sos       { server sos-ms:8002; }
    upstream chatbot   { server chatbot-ms:8003; }
    upstream game      { server gamification-ms:8004; }
    upstream maps      { server maps-ms:8005; }
    upstream risk      { server risk-ms:8006; }
    upstream admin     { server admin-ms:8007; }

    server {
        listen 80;
        server_name localhost;

        # ── API Routes ──
        location /api/auth/ {
            proxy_pass http://auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/sos/ {
            proxy_pass http://sos/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/chat/ {
            proxy_pass http://chatbot/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/game/ {
            proxy_pass http://game/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/maps/ {
            proxy_pass http://maps/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/risk/ {
            proxy_pass http://risk/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/admin/ {
            proxy_pass http://admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── WebSocket for Chatbot ──
        location /socket.io/ {
            proxy_pass http://chatbot/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Health check ──
        location /health {
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
