version: '3.9'

services:
  # ── Databases ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jeewan
      POSTGRES_PASSWORD: jeewan_secret
      POSTGRES_DB: jeewan_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeewan"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Microservices ──
  auth-ms:
    build: ./auth
    ports:
      - "8001:8001"
    env_file: .env
    # volumes:
    #   - ./auth/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  sos-ms:
    build: ./sos
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload

  chatbot-ms:
    build: ./chatbot
    ports:
      - "8003:8003"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:socket_app --host 0.0.0.0 --port 8003 --reload

  gamification-ms:
    build: ./gamification
    ports:
      - "8004:8004"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload

  maps-ms:
    build: ./maps
    ports:
      - "8005:8005"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8005 --reload

  risk-ms:
    build: ./risk
    ports:
      - "8006:8006"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8006 --reload

  admin-ms:
    build: ./admin
    ports:
      - "8007:8007"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --reload

  # ── API Gateway ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-ms
      - sos-ms
      - chatbot-ms
      - gamification-ms
      - maps-ms
      - risk-ms
      - admin-ms

volumes:
  pgdata:
